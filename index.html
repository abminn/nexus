<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retired FRFR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050505;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        /* The Video Container */
        .video-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Added a slight blur to the video for that 'dreamy' modern look */
            filter: brightness(0.5) blur(2px);
        }

        /* Dark overlay to make text pop */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%);
            z-index: -1;
        }

        /* The Main Aesthetic Card */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 60px;
            border-radius: 100px; /* Pill shape for modern look */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: float 4s ease-in-out infinite;
            transition: all 0.3s ease;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.3);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: lowercase;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline crossorigin="anonymous">
            <source src="https://files.catbox.moe/kgwbtv.mp4" type="video/mp4">
        </video>
    </div>

    <div class="overlay"></div>

    <div class="card">
        <h1>am retired frfr dont eat me pls</h1>
    </div>

</body>
</html>
